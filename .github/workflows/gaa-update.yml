name: GAA Weekly Update

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  gaa-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GAA scraper
        run: python gaa_scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gaa_elo.json data/gaa_results.json
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "GAA data update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
