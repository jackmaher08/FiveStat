name: FiveStat Auto-Update

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Which run to execute'
        required: true
        default: 'football'
        type: choice
        options:
          - full
          - football
          - f1
          - f1_historical

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect run type
        id: run_type
        run: echo "type=${{ inputs.run_type }}" >> $GITHUB_OUTPUT

      # ── Full: football + F1 ───────────────────────────────────────────────
      - name: Full pipeline
        if: steps.run_type.outputs.type == 'full'
        run: |
          python data_scraper_script.py
          python data_loader.py
          python generate_shotmaps.py
          python shotmap_script.py
          python f1_scraper.py

      # ── Football only ─────────────────────────────────────────────────────
      - name: Football pipeline
        if: steps.run_type.outputs.type == 'football'
        run: |
          python data_scraper_script.py
          python data_loader.py
          python generate_shotmaps.py
          python shotmap_script.py

      # ── F1: current season only ───────────────────────────────────────────
      - name: F1 pipeline
        if: steps.run_type.outputs.type == 'f1'
        run: python f1_scraper.py

      # ── F1: historical backfill ───────────────────────────────────────────
      - name: F1 historical pipeline
        if: steps.run_type.outputs.type == 'f1_historical'
        run: python f1_scraper.py --historical

      # ── Commit and push (triggers Railway redeploy) ───────────────────────
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC') [${{ steps.run_type.outputs.type }}]"
          git push